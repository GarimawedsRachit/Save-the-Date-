*{margin:0;padding:0;box-sizing:border-box;}

/* ══ SPLASH ══ */
.splash{position:fixed;inset:0;z-index:9999;background:radial-gradient(ellipse at 50% 50%, #1a120b, #0a0604);display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;transition:opacity 1.2s ease, visibility 1.2s ease;}
.splash.hide{opacity:0;visibility:hidden;pointer-events:none;}
.splash-particles{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
.s-particle{position:absolute;border-radius:50%;opacity:0;animation:sFloat var(--d) ease-in-out infinite var(--del);}
@keyframes sFloat{0%,100%{opacity:0;transform:scale(0) translateY(0);}50%{opacity:0.6;transform:scale(1) translateY(-30px);}}
.splash-ring{position:absolute;width:300px;height:300px;border-radius:50%;border:1px solid rgba(201,166,107,0);transform:scale(0);animation:ringReveal 2.5s cubic-bezier(.22,1,.36,1) .2s forwards;}
.splash-ring2{position:absolute;width:380px;height:380px;border-radius:50%;border:1px solid rgba(201,166,107,0);transform:scale(0);animation:ringReveal 3s cubic-bezier(.22,1,.36,1) .5s forwards;}
.splash-ring3{position:absolute;width:460px;height:460px;border-radius:50%;border:1px solid rgba(201,166,107,0);transform:scale(0);animation:ringReveal 3.5s cubic-bezier(.22,1,.36,1) .8s forwards;}
@keyframes ringReveal{0%{transform:scale(0);border-color:rgba(201,166,107,0);}50%{border-color:rgba(201,166,107,0.35);}100%{transform:scale(1);border-color:rgba(201,166,107,0.06);}}
.splash-content{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:6px;}
.s-line{width:0;height:1.5px;background:linear-gradient(90deg,transparent,#c9a66b,transparent);}
.s-line.t{animation:lineGrow 1.5s ease .3s forwards;}
.s-line.b{animation:lineGrow 1.5s ease 2.2s forwards;}
@keyframes lineGrow{to{width:200px;}}
.s-name{font-family:'Great Vibes',cursive;font-size:86px;color:#f5dfc0;line-height:1.1;overflow:visible;text-shadow:0 0 40px rgba(201,166,107,0.4),0 0 80px rgba(201,166,107,0.15);}
.s-name .letter{display:inline-block;opacity:0;transform:translateY(50px) scale(0.3);filter:blur(8px);}
.s-name.go .letter{animation:letterReveal .8s cubic-bezier(.22,1,.36,1) forwards;}
@keyframes letterReveal{0%{opacity:0;transform:translateY(50px) scale(0.3);filter:blur(8px);}60%{opacity:1;transform:translateY(-5px) scale(1.05);filter:blur(0);}100%{opacity:1;transform:translateY(0) scale(1);filter:blur(0);}}
.s-weds{font-family:'Cinzel',serif;font-size:18px;font-weight:600;letter-spacing:14px;text-transform:uppercase;color:#c9a66b;opacity:0;transform:scaleX(0);transform-origin:center;}
.s-weds.go{animation:wedsReveal 1s cubic-bezier(.22,1,.36,1) forwards;}
@keyframes wedsReveal{0%{opacity:0;transform:scaleX(0);letter-spacing:30px;}100%{opacity:1;transform:scaleX(1);letter-spacing:14px;}}
.s-date{font-family:'Cinzel',serif;font-size:15px;font-weight:600;letter-spacing:8px;color:#c9a66b;margin-top:16px;opacity:0;}
.s-date.go{animation:dateFade 1.2s ease forwards;}
@keyframes dateFade{to{opacity:0.9;}}
.s-name.shimmer-go::after{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3),transparent);animation:shimmerPass 1.2s ease forwards;}
@keyframes shimmerPass{0%{left:-100%;}100%{left:100%;}}

/* ══ HERO ══ */
.hero{position:relative;width:100%;height:100vh;min-height:600px;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.hero-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:scale(1.05);transition:transform 8s ease-out;}
.hero.visible .hero-img{transform:scale(1);}
.hero-overlay{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 30%, transparent 30%, rgba(13,8,5,0.4) 70%),linear-gradient(180deg, rgba(13,8,5,0.5) 0%, rgba(13,8,5,0.1) 25%, rgba(13,8,5,0.1) 55%, rgba(13,8,5,0.85) 90%, #0d0805 100%);}
.hero-content{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;height:100%;width:100%;padding:50px 20px 60px;justify-content:space-between;}
.top-flourish{display:flex;flex-direction:column;align-items:center;gap:4px;opacity:0;transform:translateY(-30px);transition:all 1.2s cubic-bezier(.22,1,.36,1);}
.hero.visible .top-flourish{opacity:1;transform:translateY(0);}
.line-deco{width:100px;height:1px;background:linear-gradient(90deg,transparent,#c9a66b,transparent);}
.save-the{font-family:'Cinzel',serif;font-size:13px;font-weight:400;letter-spacing:10px;text-transform:uppercase;color:#c9a66b;}
.date-word{font-family:'Great Vibes',cursive;font-size:58px;color:#f5dfc0;line-height:1;text-shadow:0 2px 30px rgba(180,140,70,0.35);}
.hero-bottom{display:flex;flex-direction:column;align-items:center;gap:10px;opacity:0;transform:translateY(40px);transition:all 1.4s cubic-bezier(.22,1,.36,1) .3s;}
.hero.visible .hero-bottom{opacity:1;transform:translateY(0);}
.date-number{font-family:'Playfair Display',serif;font-size:80px;font-weight:700;color:#fff;line-height:1;text-shadow:0 4px 40px rgba(0,0,0,0.5);}
.month-year{font-family:'Cinzel',serif;font-size:18px;font-weight:600;letter-spacing:12px;color:#c9a66b;}
.scroll-hint{margin-top:20px;display:flex;flex-direction:column;align-items:center;gap:6px;opacity:0.5;animation:pulseHint 2.5s ease-in-out infinite;}
.scroll-hint span{font-family:'Cormorant Garamond',serif;font-size:12px;letter-spacing:4px;text-transform:uppercase;color:#c9a66b;}
.scroll-arrow{width:20px;height:20px;border-right:1.5px solid #c9a66b;border-bottom:1.5px solid #c9a66b;transform:rotate(45deg);}
@keyframes pulseHint{0%,100%{opacity:0.3;transform:translateY(0);}50%{opacity:0.7;transform:translateY(6px);}}

/* ══ DIVIDER ══ */
.dark-divider{width:100%;padding:50px 0;display:flex;align-items:center;justify-content:center;background:#0d0805;}
.dark-divider-inner{display:flex;flex-direction:column;align-items:center;gap:12px;opacity:0;transform:scale(0.8);transition:all 1s ease .1s;}
.dark-divider.visible .dark-divider-inner{opacity:1;transform:scale(1);}
.gd-line{width:60px;height:1px;background:linear-gradient(90deg,transparent,#c9a66b,transparent);}

/* ══ SECTION 2 ══ */
.section2{position:relative;width:100%;min-height:100vh;overflow:hidden;display:flex;align-items:center;justify-content:center;}

.section2.visible .s2-img{transform:scale(1);}
.s2-overlay{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 60%, transparent 20%, rgba(13,8,5,0.45) 70%),linear-gradient(180deg, #0d0805 0%, rgba(13,8,5,0.15) 15%, rgba(13,8,5,0.15) 70%, rgba(13,8,5,0.9) 95%, #0d0805 100%);}
.s2-content{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100vh;width:100%;padding:40px 20px 60px;gap:16px;}
.s2-quote{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;font-style:italic;color:#e8cba8;text-align:center;max-width:420px;line-height:1.6;opacity:0;transform:translateY(30px);transition:all 1.2s ease .2s;}
.section2.visible .s2-quote{opacity:1;transform:translateY(0);}
.s2-tagline{font-family:'Cinzel',serif;font-size:12px;font-weight:400;letter-spacing:6px;text-transform:uppercase;color:#a08050;opacity:0;transition:all 1s ease .5s;}
.section2.visible .s2-tagline{opacity:0.7;}

.footer{background:#0d0805;padding:40px 20px 100px;text-align:center;}
.footer-text{font-family:'Cormorant Garamond',serif;font-size:14px;color:#6b5a40;letter-spacing:3px;}

/* ══ HEART + LIVE COUNTER ══ */
.heart-wrapper{position:fixed;bottom:28px;right:28px;z-index:999;display:flex;flex-direction:column;align-items:center;gap:6px;}
.heart-count{background:rgba(13,8,5,0.85);border:1px solid rgba(201,166,107,0.3);border-radius:20px;padding:5px 14px;font-family:'Cinzel',serif;font-size:14px;font-weight:600;color:#f5dfc0;letter-spacing:1px;box-shadow:0 2px 12px rgba(0,0,0,0.3);display:flex;align-items:center;gap:6px;min-width:55px;justify-content:center;transition:all .3s ease;}
.count-num{display:inline-block;transition:transform .2s ease;}
.heart-count.bump .count-num{animation:countBump .35s ease;}
@keyframes countBump{0%{transform:scale(1);}40%{transform:scale(1.5) translateY(-2px);}100%{transform:scale(1);}}
.heart-count.live-pulse{animation:livePulse .6s ease;}
@keyframes livePulse{0%{border-color:rgba(201,166,107,0.3);box-shadow:0 2px 12px rgba(0,0,0,0.3);}50%{border-color:rgba(220,180,100,0.8);box-shadow:0 0 20px rgba(201,166,107,0.3);}100%{border-color:rgba(201,166,107,0.3);box-shadow:0 2px 12px rgba(0,0,0,0.3);}}

.heart-btn{width:60px;height:60px;border:none;background:radial-gradient(circle at 40% 35%, #d4785a, #b8445a 60%, #8b2a40);border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 24px rgba(180,60,70,0.45);transition:all .3s ease;animation:heartGlow 2.5s ease-in-out infinite;}
.heart-btn:hover{transform:scale(1.12);box-shadow:0 6px 32px rgba(180,60,70,0.6);}
.heart-btn:active{transform:scale(0.88);}
.heart-btn svg{width:28px;height:28px;fill:#fff;filter:drop-shadow(0 1px 3px rgba(0,0,0,0.3));}
@keyframes heartGlow{0%,100%{box-shadow:0 4px 24px rgba(180,60,70,0.45),0 0 0 0 rgba(180,60,70,0.3);}50%{box-shadow:0 4px 24px rgba(180,60,70,0.45),0 0 0 12px rgba(180,60,70,0);}}
.heart-btn.beat{animation:heartBeat .4s ease!important;}
@keyframes heartBeat{0%{transform:scale(1);}25%{transform:scale(0.85);}50%{transform:scale(1.15);}75%{transform:scale(0.95);}100%{transform:scale(1);}}

.heart-float{position:fixed;pointer-events:none;z-index:998;opacity:0;animation:heartRise var(--dur) ease-out forwards;}
@keyframes heartRise{0%{opacity:1;transform:translate(0,0) scale(.3) rotate(0deg);}15%{opacity:1;transform:translate(var(--dx1),-50px) scale(1.1) rotate(var(--r1));}50%{opacity:.85;transform:translate(var(--dx2),-180px) scale(.95) rotate(var(--r2));}100%{opacity:0;transform:translate(var(--dx3),-380px) scale(.5) rotate(var(--r3));}}

.sparkle-field{position:fixed;inset:0;pointer-events:none;z-index:1;overflow:hidden;}
.sparkle{position:absolute;width:2.5px;height:2.5px;background:#f5dfc0;border-radius:50%;opacity:0;animation:twinkle var(--sp-dur) infinite var(--sp-delay);}
@keyframes twinkle{0%,100%{opacity:0;transform:scale(0);}50%{opacity:.6;transform:scale(1);}}

/* ══ FIREBASE STATUS ══ */
.fb-status{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:9998;font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px;padding:4px 16px;border-radius:20px;opacity:0;transition:opacity .5s ease;pointer-events:none;}
.fb-status.online{background:rgba(80,160,80,0.2);color:#8fce8f;border:1px solid rgba(80,160,80,0.3);opacity:1;}
.fb-status.offline{background:rgba(200,100,60,0.2);color:#e8a080;border:1px solid rgba(200,100,60,0.3);opacity:1;}
.fb-status.fade{opacity:0;}

/* ══ TAP INTRO ══ */
.tap-intro{
  position:fixed;inset:0;z-index:99999;
  background:radial-gradient(ellipse at 50% 50%, #1a120b, #0a0604);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  transition:opacity .8s ease, visibility .8s ease;
}
.tap-intro.hide{opacity:0;visibility:hidden;pointer-events:none;}
.tap-inner{
  display:flex;flex-direction:column;align-items:center;gap:14px;
  animation:tapFloat 3s ease-in-out infinite;
}
@keyframes tapFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.tap-ornament{font-size:24px;color:#c9a66b;opacity:0.5;}
.tap-names{
  font-family:'Great Vibes',cursive;font-size:42px;color:#f5dfc0;
  text-shadow:0 0 30px rgba(201,166,107,0.3);
}
.tap-line{width:80px;height:1px;background:linear-gradient(90deg,transparent,#c9a66b,transparent);}
.tap-cta{
  font-family:'Cinzel',serif;font-size:13px;font-weight:600;
  letter-spacing:6px;text-transform:uppercase;color:#c9a66b;
  animation:tapPulse 2s ease-in-out infinite;
}
@keyframes tapPulse{0%,100%{opacity:0.5;}50%{opacity:1;}}
.tap-ring{
  position:absolute;width:200px;height:200px;border-radius:50%;
  border:1px solid rgba(201,166,107,0.1);
  animation:tapRing 3s ease-in-out infinite;
}
@keyframes tapRing{0%,100%{transform:scale(0.9);border-color:rgba(201,166,107,0.05);}50%{transform:scale(1.1);border-color:rgba(201,166,107,0.2);}}

@media(max-width:600px){
  .tap-names{font-size:32px;}
  .tap-cta{font-size:11px;letter-spacing:4px;}
}

/* ══ MUSIC BUTTON ══ */
.music-btn{
  position:fixed;bottom:28px;left:28px;z-index:999;
  width:50px;height:50px;border:none;
  background:rgba(13,8,5,0.7);
  border:1px solid rgba(201,166,107,0.35);
  border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 16px rgba(0,0,0,0.3);
  transition:all .3s ease;
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
}
.music-btn:hover{transform:scale(1.1);border-color:rgba(201,166,107,0.6);}
.music-btn svg{width:22px;height:22px;fill:#c9a66b;transition:all .3s ease;}
.music-btn.playing svg{fill:#f5dfc0;filter:drop-shadow(0 0 6px rgba(201,166,107,0.5));}
.music-btn .bars{display:flex;align-items:flex-end;gap:3px;height:18px;}
.music-btn .bar{
  width:3px;background:#c9a66b;border-radius:2px;
  transition:background .3s ease;
}
.music-btn.playing .bar{background:#f5dfc0;animation:barPulse 0.8s ease-in-out infinite alternate;}
.music-btn .bar:nth-child(1){height:6px;animation-delay:0s;}
.music-btn .bar:nth-child(2){height:12px;animation-delay:0.15s;}
.music-btn .bar:nth-child(3){height:8px;animation-delay:0.3s;}
.music-btn .bar:nth-child(4){height:14px;animation-delay:0.45s;}
.music-btn:not(.playing) .bar{animation:none!important;}
@keyframes barPulse{
  0%{height:4px;}
  100%{height:18px;}
}

@media(max-width:600px){
  .save-the{font-size: 19px;}
  .date-word{font-size: 22px;}
  .s-name{font-size:58px;}
  .s-weds{font-size:14px;letter-spacing:10px;}
  .s-weds.go{animation-name:wedsM;}
  @keyframes wedsM{0%{opacity:0;transform:scaleX(0);letter-spacing:20px;}100%{opacity:1;transform:scaleX(1);letter-spacing:10px;}}
  .splash-ring{width:220px;height:220px;}.splash-ring2{width:280px;height:280px;}.splash-ring3{width:340px;height:340px;}
  .date-word{font-size:44px;}.date-number{font-size:60px;}.month-year{font-size:14px;letter-spacing:8px;}
  .s2-quote{font-size:18px;}.divider-names{font-size:26px;}
  .heart-btn{width:52px;height:52px;}.heart-btn svg{width:24px;height:24px;}
  .heart-wrapper{bottom:20px;right:20px;}
  .music-btn{width:44px;height:44px;bottom:20px;left:20px;}
}
</style>

  let likesRef = null;
  let firebaseReady = false;
  const countEl = document.getElementById('countNum');
  const heartCountEl = document.getElementById('heartCount');
  const heartBtn = document.getElementById('heartBtn');
  const fbStatus = document.getElementById('fbStatus');

  // Initialize Firebase
  try {
    if (firebaseConfig.apiKey !== "YOUR_API_KEY") {
      firebase.initializeApp(firebaseConfig);
      db = firebase.database();
      likesRef = db.ref('wedding/likes');

      // REAL-TIME LISTENER — instant updates across all devices!
      likesRef.on('value', (snapshot) => {
        const val = snapshot.val() || 0;
        const current = parseInt(countEl.textContent) || 0;
        countEl.textContent = val;

        // If count changed from another device, pulse the badge
        if (val !== current && current !== 0) {
          heartCountEl.classList.remove('live-pulse');
          void heartCountEl.offsetWidth;
          heartCountEl.classList.add('live-pulse');
        }
      });

      firebaseReady = true;
      fbStatus.textContent = '● LIVE';
      fbStatus.className = 'fb-status online';
      setTimeout(() => fbStatus.classList.add('fade'), 3000);
    } else {
      // Config not set — show offline notice
      fbStatus.textContent = '● OFFLINE — add Firebase config';
      fbStatus.className = 'fb-status offline';
    }
  } catch(e) {
    console.error('Firebase init error:', e);
    fbStatus.textContent = '● CONNECTION ERROR';
    fbStatus.className = 'fb-status offline';
  }

  /* ══ SPLASH ══ */
  function wrapLetters(el, text) {
    el.innerHTML = '';
    for (let i = 0; i < text.length; i++) {
      const span = document.createElement('span');
      span.className = 'letter';
      span.textContent = text[i] === ' ' ? '\u00A0' : text[i];
      span.style.animationDelay = (i * 0.09) + 's';
      el.appendChild(span);
    }
  }
  wrapLetters(document.getElementById('sName1'), 'Garima');
  wrapLetters(document.getElementById('sName2'), 'Rachit');

  const sp = document.getElementById('sParticles');
  for(let i=0;i<60;i++){
    const p=document.createElement('div');p.className='s-particle';
    p.style.left=Math.random()*100+'%';p.style.top=Math.random()*100+'%';
    const sz=2+Math.random()*3;p.style.width=sz+'px';p.style.height=sz+'px';
    p.style.background=Math.random()>0.5?'#c9a66b':'#f5dfc0';
    p.style.setProperty('--d',(2+Math.random()*3)+'s');
    p.style.setProperty('--del',(Math.random()*4)+'s');
    sp.appendChild(p);
  }

  /* ══ MUSIC PLAYER ══ */
  const bgMusic = document.getElementById('bgMusic');
  const musicBtn = document.getElementById('musicBtn');
  const tapIntro = document.getElementById('tapIntro');
  const splash = document.getElementById('splash');
  let musicPlaying = false;
  let started = false;

  // ── TAP TO BEGIN — starts music + splash animation together ──
  tapIntro.addEventListener('click', startEverything);
  tapIntro.addEventListener('touchend', startEverything);

  function startEverything(e) {
    e.preventDefault();
    if (started) return;
    started = true;

    // Start music immediately
    bgMusic.play().then(() => {
      musicPlaying = true;
      musicBtn.classList.add('playing');
    }).catch(() => {});

    // Hide tap screen
    tapIntro.classList.add('hide');

    // Show & start splash animations
    splash.style.opacity = '1';
    setTimeout(() => document.getElementById('sName1').classList.add('go'), 400);
    setTimeout(() => document.getElementById('sWeds').classList.add('go'), 1300);
    setTimeout(() => document.getElementById('sName2').classList.add('go'), 2000);
    setTimeout(() => document.getElementById('sName2').classList.add('shimmer-go'), 3000);
    setTimeout(() => document.getElementById('sDate').classList.add('go'), 3200);
    setTimeout(() => {
      splash.classList.add('hide');
      document.getElementById('heartWrapper').style.display = 'flex';
    }, 4200);
  }

  // Toggle music on button click
  musicBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    if (musicPlaying) {
      bgMusic.pause();
      musicPlaying = false;
      musicBtn.classList.remove('playing');
    } else {
      bgMusic.play().then(() => {
        musicPlaying = true;
        musicBtn.classList.add('playing');
      }).catch(() => {});
    }
  });

  /* ══ SPARKLES ══ */
  const sf = document.getElementById('sparkleField');
  for(let i=0;i<30;i++){
    const s=document.createElement('div');s.className='sparkle';
    s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';
    s.style.setProperty('--sp-dur',(2+Math.random()*3)+'s');
    s.style.setProperty('--sp-delay',(Math.random()*4)+'s');
    sf.appendChild(s);
  }

  /* ══ SCROLL ══ */
  const obs = new IntersectionObserver((entries)=>{
    entries.forEach(e=>{if(e.isIntersecting) e.target.classList.add('visible');});
  },{threshold:0.15});
  document.querySelectorAll('.hero,.dark-divider,.section2').forEach(el=>obs.observe(el));

  /* ══ HEART CLICK — UNLIMITED, LIVE ══ */
  const hts=['❤️','💖','💕','💗','💓','🤍','💛','🩷','✨','💐','🌸','💝'];
  function rn(a,b){return a+Math.random()*(b-a);}

  heartBtn.addEventListener('click', function(){
    // Firebase atomic increment — safe even with multiple users clicking
    if (firebaseReady && likesRef) {
      likesRef.transaction((current) => (current || 0) + 1);
    } else {
      // Fallback for offline / no config
      const c = parseInt(countEl.textContent) || 0;
      countEl.textContent = c + 1;
    }

    // Bump animation
    heartCountEl.classList.remove('bump');
    void heartCountEl.offsetWidth;
    heartCountEl.classList.add('bump');

    // Beat animation
    heartBtn.classList.remove('beat');
    void heartBtn.offsetWidth;
    heartBtn.classList.add('beat');
    setTimeout(() => heartBtn.classList.remove('beat'), 450);

    // Burst hearts
    const rect = this.getBoundingClientRect();
    const cx = rect.left + rect.width / 2, cy = rect.top + rect.height / 2;
    const burstCount = 6 + Math.floor(Math.random() * 4);
    for (let i = 0; i < burstCount; i++) {
      setTimeout(() => {
        const h = document.createElement('div');
        h.className = 'heart-float';
        h.textContent = hts[Math.floor(Math.random() * hts.length)];
        h.style.fontSize = rn(18, 36) + 'px';
        h.style.left = cx + 'px'; h.style.top = cy + 'px';
        h.style.setProperty('--dur', rn(1.4, 2.4) + 's');
        h.style.setProperty('--dx1', rn(-50, 50) + 'px');
        h.style.setProperty('--dx2', rn(-90, 90) + 'px');
        h.style.setProperty('--dx3', rn(-130, 130) + 'px');
        h.style.setProperty('--r1', rn(-25, 25) + 'deg');
        h.style.setProperty('--r2', rn(-15, 15) + 'deg');
        h.style.setProperty('--r3', rn(-30, 30) + 'deg');
        document.body.appendChild(h);
        setTimeout(() => h.remove(), 2600);
      }, i * 60);
    }
  });
</script>
</body>
</html>
